services:
  # Backend API Service
  - type: web
    name: proxymukt-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: QR_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://proxymukt.onrender.com
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: proxymukt-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://proxymukt-api.onrender.com/api
